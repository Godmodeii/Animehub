<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AnimeHeaven Proxy</title>
</head>
<body>
<h1>AnimeHeaven Proxy</h1>
<input type="text" id="url" placeholder="Enter page URL" style="width: 80%;"/>
<button onclick="loadPage()">Load</button>
<iframe id="content" style="width:100%; height:80vh; margin-top:20px;"></iframe>

<script>
function loadPage() {
  const url = document.getElementById('url').value;
  const proxyUrl = `https://animethehubof.netlify.app//.netlify/functions/proxy?path=${encodeURIComponent(url)}`;
  document.getElementById('content').src = proxyUrl;
}
</script>
</body>
</html>
